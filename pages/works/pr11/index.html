<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интернет-магазин</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="products">
        <div class="product-card">
            <h3>Паспорт Болгарии</h3>
            <img src="../../../img/pr11/cover-passport-of-bulgaria-free-vector.jpg">
            <div class="price">$1000</div>
            <div class="quantity">
                <label>кол-во</label>
                <input type="number" value="1" min="1">
            </div>
            <button class="add-to-cart">Заказать</button>
        </div>

        <div class="product-card">
            <h3>Пасопрт Афганистана</h3>
            <img src="../../../img/pr11/istockphoto-110937514-170667a.jpg">
            <div class="price">$2.50</div>
            <div class="quantity">
                <label>кол-во</label>
                <input type="number" value="2" min="1">
            </div>
            <button class="add-to-cart">Заказать</button>
        </div>

        <div class="product-card">
            <h3>Паспорт России</h3>
            <img src="../../../img/pr11/pic_8448.jpg">
            <div class="price">$3000</div>
            <div class="quantity">
                <label>кол-во</label>
                <input type="number" value="8" min="1">
            </div>
            <button class="add-to-cart">Заказать</button>
        </div>

        <div class="product-card">
            <h3>Паспорт Мексики</h3>
            <img src="../../../img/pr11/Паспорт Мексики.jpg">
            <div class="price">$1500</div>
            <div class="quantity">
                <label>кол-во</label>
                <input type="number" value="1" min="1">
            </div>
            <button class="add-to-cart">Заказать</button>
        </div>
    </main>
</body>
</html>
