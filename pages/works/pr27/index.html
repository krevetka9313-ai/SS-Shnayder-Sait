<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инфографика - Приложение садоводов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <h1>Возможности приложения</h1>
        <div class="infographic">
            <div class="item">
                <div class="circle">1</div>
                <h3>Советы садоводам</h3>
                <p>Полезные рекомендации от опытных огородников по уходу за растениями</p>
            </div>
            <div class="item">
                <div class="circle">2</div>
                <h3>Каталог растений</h3>
                <p>Удобный справочник с описанием видов и рекомендациями по посадке</p>
            </div>
            <div class="item">
                <div class="circle">3</div>
                <h3>Форум дачников</h3>
                <p>Площадка для обмена мнениями, фотографиями урожая и вопросами</p>
            </div>
        </div>
    </div>
</body>
</html>
